<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Login - J8K Ventures Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.login-container{
    max-width:450px;
    width:100%;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    overflow:hidden;
}

.login-header{
    background:#0a7cff;
    padding:40px 30px;
    text-align:center;
    color:white;
}

.login-header h1{
    font-size:28px;
    margin-bottom:10px;
}

.login-header p{
    opacity:0.9;
    font-size:14px;
}

.login-body{
    padding:40px 30px;
}

.form-group{
    margin-bottom:25px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
    font-size:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border:2px solid #e0e0e0;
    border-radius:12px;
    font-size:14px;
    transition:all 0.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#0a7cff;
}

.btn-login{
    width:100%;
    padding:14px;
    background:#0a7cff;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:background 0.3s;
}

.btn-login:hover{
    background:#005fcc;
}

.register-link{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:14px;
}

.register-link a{
    color:#0a7cff;
    text-decoration:none;
    font-weight:bold;
}

.register-link a:hover{
    text-decoration:underline;
}

.error-msg{
    background:#fee;
    color:#dc3545;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.success-msg{
    background:#d4edda;
    color:#28a745;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.forgot-password{
    text-align:right;
    margin-top:-15px;
    margin-bottom:20px;
}

.forgot-password a{
    color:#666;
    font-size:12px;
    text-decoration:none;
}

.forgot-password a:hover{
    color:#0a7cff;
}

.spinner{
    display:inline-block;
    width:16px;
    height:16px;
    border:2px solid white;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin-right:8px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.btn-login:disabled{
    opacity:0.7;
    cursor:not-allowed;
}
</style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>J8K Ventures</h1>
        <p>Dashboard Login</p>
    </div>
    
    <div class="login-body">
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <div class="forgot-password">
                <a href="forgot-password.html">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">Login</button>
        </form>
        
        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://amxhpxqakqrjjihwkzcq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteGhweHFha3FyamppaHdremNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5Nzc2NjUsImV4cCI6MjA4MzU1MzY2NX0.yIAZtz3bUc_ZxF8-f4cqW1fKJgFiRsiJdj4qgCDmM0g";
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        // Hide previous messages
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        // Show loading state
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
        
        try {
            const { data, error } = await sb.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) throw error;
            
            if (data.session) {
                // Check if user has a supplier profile
                const { data: supplier, error: supplierError } = await sb
                    .from('poultry_suppliers')
                    .select('id')
                    .eq('user_id', data.user.id)
                    .maybeSingle();
                
                // If no supplier profile exists, create one
                if (!supplier) {
                    const { error: createError } = await sb
                        .from('poultry_suppliers')
                        .insert([{
                            user_id: data.user.id,
                            company_name: 'My Poultry Business',
                            slug: data.user.id.slice(0, 15),
                            email: email,
                            phone: '+256 700 000000',
                            whatsapp_number: '+256 700 000000',
                            description: 'Welcome to my poultry business',
                            address: 'Kampala, Uganda',
                            is_active: true,
                            created_at: new Date().toISOString()
                        }]);
                    
                    if (createError) {
                        console.error('Error creating supplier:', createError);
                    }
                }
                
                // Show success message
                successMsg.style.display = 'block';
                successMsg.textContent = 'Login successful! Redirecting to dashboard...';
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
            
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message || 'Login failed. Please check your credentials.';
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login';
        }
    });
    
    // Check if already logged in
    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            window.location.href = 'dashboard.html';
        }
    }
    
    checkSession();
</script>
</body>
</html>
