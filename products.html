<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Products - J8K Ventures Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
}

.loading{
    text-align:center;
    padding:50px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.spinner{
    width:50px;
    height:50px;
    border:4px solid #ddd;
    border-top-color:#0a7cff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.dashboard-header{
    background:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    position:sticky;
    top:0;
    z-index:100;
    flex-wrap:wrap;
    gap:15px;
}

.dashboard-header h1{
    font-size:20px;
    color:#0a7cff;
}

.user-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.user-email{
    font-size:14px;
    color:#666;
}

.logout-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.dashboard-body{
    display:flex;
    min-height:calc(100vh - 65px);
}

.sidebar{
    width:260px;
    background:#1a1a2e;
    color:white;
    padding:20px 0;
}

.sidebar a{
    display:block;
    padding:14px 20px;
    color:white;
    text-decoration:none;
    transition:all 0.3s;
}

.sidebar a:hover, .sidebar a.active{
    background:#0a7cff;
}

.sidebar a i{
    margin-right:12px;
    width:20px;
}

.content{
    flex:1;
    padding:25px;
    overflow-x:auto;
}

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.page-header h2{
    font-size:24px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.btn-primary{
    background:#0a7cff;
    color:white;
}

.btn-primary:hover{
    background:#005fcc;
}

.btn-danger{
    background:#dc3545;
    color:white;
}

.btn-danger:hover{
    background:#c82333;
}

.btn-sm{
    padding:6px 12px;
    font-size:12px;
}

.form-card{
    background:white;
    border-radius:12px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    font-size:14px;
}

.form-group input, .form-group textarea, .form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.image-upload-area{
    border:2px dashed #ddd;
    border-radius:12px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:all 0.3s;
}

.image-upload-area:hover{
    border-color:#0a7cff;
    background:#f8f9fa;
}

.image-preview{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:8px;
    margin-top:10px;
}

table{
    width:100%;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

th, td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background:#f8f9fa;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.modal-content{
    background:white;
    max-width:600px;
    width:90%;
    border-radius:15px;
    max-height:85vh;
    overflow-y:auto;
}

.modal-header{
    padding:18px;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.modal-body{
    padding:20px;
}

.progress-bar{
    width:100%;
    height:4px;
    background:#eee;
    border-radius:2px;
    margin-top:10px;
    display:none;
}

.progress-fill{
    width:0%;
    height:100%;
    background:#0a7cff;
    border-radius:2px;
    transition:width 0.3s;
}

.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    z-index:1000;
    display:none;
}

@media (max-width:768px){
    .dashboard-body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
        display:flex;
        overflow-x:auto;
        padding:10px;
    }
    .sidebar a{
        display:inline-block;
        padding:10px 15px;
        white-space:nowrap;
    }
    .form-row{
        grid-template-columns:1fr;
        gap:0;
    }
    table{
        font-size:12px;
    }
    th, td{
        padding:8px;
    }
}
</style>
</head>
<body>

<div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading products...</p>
</div>

<div id="dashboardContent" style="display:none;">
    <div class="dashboard-header">
        <h1 id="companyNameHeader">J8K Ventures</h1>
        <div class="user-info">
            <span class="user-email" id="userEmail"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="dashboard-body">
        <div class="sidebar">
            <a href="index.html"><i>📊</i> Overview</a>
            <a href="products.html" class="active"><i>🐔</i> Products</a>
            <a href="testimonials.html"><i>⭐</i> Testimonials</a>
            <a href="promotions.html"><i>💉</i> Promotions</a>
            <a href="inquiries.html"><i>📨</i> Inquiries</a>
            <a href="profile.html"><i>🏢</i> Profile</a>
        </div>
        
        <div class="content">
            <div class="page-header">
                <h2>Products / Batches</h2>
                <button class="btn btn-primary" onclick="openAddModal()">➕ Add New Product</button>
            </div>
            
            <div style="overflow-x:auto;">
                <table id="productsTable">
                    <thead>
                        <tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Bird Type</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody><tr><td colspan="7">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Product</h3>
            <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body">
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="prodName" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prodDesc" rows="3"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (UGX)</label>
                        <input type="number" id="prodPrice">
                    </div>
                    <div class="form-group">
                        <label>Unit</label>
                        <input type="text" id="prodUnit" placeholder="per chick / per kg">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="prodStock" value="0">
                    </div>
                    <div class="form-group">
                        <label>Bird Type</label>
                        <input type="text" id="prodBirdType" placeholder="Broiler/Layer/Sasso">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Product Image</label>
                    <div class="image-upload-area" onclick="document.getElementById('imageFile').click()">
                        <i class="upload-icon" style="font-size:40px; color:#999;">📷</i>
                        <p>Click to upload image</p>
                        <p style="font-size:12px; color:#999;">Supports JPG, PNG, GIF (max 5MB)</p>
                    </div>
                    <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="previewImage(this)">
                    <div id="imagePreviewContainer" style="display:none;">
                        <img id="imagePreview" class="image-preview">
                        <button type="button" onclick="removeImage()" style="margin-top:10px; background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:5px;">Remove</button>
                    </div>
                    <div class="progress-bar" id="uploadProgress">
                        <div class="progress-fill"></div>
                    </div>
                    <input type="hidden" id="prodImageUrl">
                </div>
                
                <div class="form-group">
                    <label>Badge (Popular/New/Best Value)</label>
                    <input type="text" id="prodBadge" placeholder="Optional">
                </div>
                
                <div class="form-group">
                    <label>Status</label>
                    <select id="prodStatus">
                        <option value="available">Available</option>
                        <option value="sold_out">Sold Out</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%;">Save Product</button>
            </form>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://amxhpxqakqrjjihwkzcq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteGhweHFha3FyamppaHdremNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5Nzc2NjUsImV4cCI6MjA4MzU1MzY2NX0.yIAZtz3bUc_ZxF8-f4cqW1fKJgFiRsiJdj4qgCDmM0g";
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    let supplierData = null;
    let products = [];
    
    async function checkAuth() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = '../login.html';
            return;
        }
        currentUser = session.user;
        document.getElementById('userEmail').textContent = currentUser.email;
        await loadSupplier();
        await loadProducts();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
    }
    
    async function loadSupplier() {
        let { data } = await sb
            .from('poultry_suppliers')
            .select('*')
            .eq('user_id', currentUser.id)
            .maybeSingle();
        
        if (!data) {
            const { data: byEmail } = await sb
                .from('poultry_suppliers')
                .select('*')
                .eq('email', currentUser.email)
                .maybeSingle();
            data = byEmail;
        }
        
        supplierData = data;
        if (supplierData) {
            document.getElementById('companyNameHeader').textContent = supplierData.company_name || 'My Business';
        }
    }
    
    async function loadProducts() {
        if (!supplierData) return;
        
        const { data } = await sb
            .from('poultry_products')
            .select('*')
            .eq('supplier_id', supplierData.id)
            .order('created_at', { ascending: false });
        
        products = data || [];
        renderProductsTable();
    }
    
    function renderProductsTable() {
        const tbody = document.querySelector('#productsTable tbody');
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No products yet. Click "Add New Product" to get started.</td></tr>';
            return;
        }
        
        tbody.innerHTML = products.map(p => `
            <tr>
                <td><img src="${p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/50'}" style="width:50px; height:50px; object-fit:cover; border-radius:8px;"></td>
                <td><strong>${escapeHtml(p.name)}</strong><br><small>${escapeHtml(p.bird_type || '')}</small></td>
                <td>UGX ${(p.price_per_bird || 0).toLocaleString()}<br><small>${p.unit || ''}</small></td>
                <td>${p.available_quantity || 0}</td>
                <td>${escapeHtml(p.bird_type || '-')}</td>
                <td><span style="background:${p.status === 'available' ? '#28a745' : '#dc3545'}; color:white; padding:2px 8px; border-radius:20px; font-size:12px;">${p.status === 'available' ? 'Available' : 'Sold Out'}</span></td>
                <td><button class="btn btn-primary btn-sm" onclick="editProduct('${p.id}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button></td>
            </tr>
        `).join('');
    }
    
    async function uploadImage(file) {
        if (!file) return null;
        
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
        const filePath = `products/${supplierData.id}/${fileName}`;
        
        const progressBar = document.getElementById('uploadProgress');
        const progressFill = progressBar.querySelector('.progress-fill');
        progressBar.style.display = 'block';
        
        const { data, error } = await sb.storage
            .from('poultry-images')
            .upload(filePath, file, {
                cacheControl: '3600',
                upsert: false
            });
        
        progressBar.style.display = 'none';
        
        if (error) {
            console.error('Upload error:', error);
            showToast('Image upload failed: ' + error.message);
            return null;
        }
        
        const { data: publicUrl } = sb.storage
            .from('poultry-images')
            .getPublicUrl(filePath);
        
        return publicUrl.publicUrl;
    }
    
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreviewContainer').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    
    function removeImage() {
        document.getElementById('imageFile').value = '';
        document.getElementById('imagePreviewContainer').style.display = 'none';
        document.getElementById('prodImageUrl').value = '';
    }
    
    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add Product';
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = '';
        document.getElementById('prodUnit').value = 'per chick';
        document.getElementById('prodStatus').value = 'available';
        document.getElementById('imagePreviewContainer').style.display = 'none';
        document.getElementById('prodImageUrl').value = '';
        document.getElementById('productModal').style.display = 'flex';
    }
    
    function editProduct(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('productId').value = product.id;
        document.getElementById('prodName').value = product.name;
        document.getElementById('prodDesc').value = product.description || '';
        document.getElementById('prodPrice').value = product.price_per_bird || 0;
        document.getElementById('prodUnit').value = product.unit || '';
        document.getElementById('prodStock').value = product.available_quantity || 0;
        document.getElementById('prodBirdType').value = product.bird_type || '';
        document.getElementById('prodBadge').value = product.badge || '';
        document.getElementById('prodStatus').value = product.status || 'available';
        
        if (product.images && product.images[0]) {
            document.getElementById('imagePreview').src = product.images[0];
            document.getElementById('imagePreviewContainer').style.display = 'block';
            document.getElementById('prodImageUrl').value = product.images[0];
        } else {
            document.getElementById('imagePreviewContainer').style.display = 'none';
            document.getElementById('prodImageUrl').value = '';
        }
        
        document.getElementById('productModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
    }
    
    async function saveProduct(event) {
        event.preventDefault();
        
        const id = document.getElementById('productId').value;
        let imageUrl = document.getElementById('prodImageUrl').value;
        
        // Upload new image if selected
        const imageFile = document.getElementById('imageFile').files[0];
        if (imageFile) {
            const uploadedUrl = await uploadImage(imageFile);
            if (uploadedUrl) imageUrl = uploadedUrl;
        }
        
        const product = {
            supplier_id: supplierData.id,
            name: document.getElementById('prodName').value,
            description: document.getElementById('prodDesc').value,
            price_per_bird: parseInt(document.getElementById('prodPrice').value) || 0,
            unit: document.getElementById('prodUnit').value,
            available_quantity: parseInt(document.getElementById('prodStock').value) || 0,
            total_quantity: parseInt(document.getElementById('prodStock').value) || 0,
            bird_type: document.getElementById('prodBirdType').value,
            images: imageUrl ? [imageUrl] : [],
            badge: document.getElementById('prodBadge').value,
            status: document.getElementById('prodStatus').value,
            updated_at: new Date().toISOString()
        };
        
        let result;
        if (id) {
            result = await sb.from('poultry_products').update(product).eq('id', id);
        } else {
            product.created_at = new Date().toISOString();
            result = await sb.from('poultry_products').insert([product]);
        }
        
        if (!result.error) {
            showToast(id ? 'Product updated!' : 'Product added!');
            closeModal();
            await loadProducts();
        } else {
            showToast('Error: ' + result.error.message);
        }
    }
    
    async function deleteProduct(id) {
        if (confirm('Are you sure you want to delete this product?')) {
            await sb.from('poultry_products').delete().eq('id', id);
            showToast('Product deleted');
            await loadProducts();
        }
    }
    
    async function logout() {
        await sb.auth.signOut();
        window.location.href = '../login.html';
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('productForm').addEventListener('submit', saveProduct);
    
    window.openAddModal = openAddModal;
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;
    window.closeModal = closeModal;
    window.logout = logout;
    window.previewImage = previewImage;
    window.removeImage = removeImage;
    
    checkAuth();
</script>
</body>
</html>
