<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Forgot Password - J8K Ventures</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.reset-container{
    max-width:450px;
    width:100%;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    overflow:hidden;
}

.reset-header{
    background:#0a7cff;
    padding:40px 30px;
    text-align:center;
    color:white;
}

.reset-header h1{
    font-size:28px;
    margin-bottom:10px;
}

.reset-header p{
    opacity:0.9;
    font-size:14px;
}

.reset-body{
    padding:40px 30px;
}

.form-group{
    margin-bottom:25px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
    font-size:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border:2px solid #e0e0e0;
    border-radius:12px;
    font-size:14px;
}

.form-group input:focus{
    outline:none;
    border-color:#0a7cff;
}

.btn-reset{
    width:100%;
    padding:14px;
    background:#0a7cff;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:background 0.3s;
}

.btn-reset:hover{
    background:#005fcc;
}

.back-link{
    text-align:center;
    margin-top:25px;
}

.back-link a{
    color:#0a7cff;
    text-decoration:none;
    font-size:14px;
}

.back-link a:hover{
    text-decoration:underline;
}

.error-msg{
    background:#fee;
    color:#dc3545;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.success-msg{
    background:#d4edda;
    color:#28a745;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.spinner{
    display:inline-block;
    width:16px;
    height:16px;
    border:2px solid white;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin-right:8px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="reset-container">
    <div class="reset-header">
        <h1>Reset Password</h1>
        <p>We'll send you a link to reset your password</p>
    </div>
    
    <div class="reset-body">
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your registered email">
            </div>
            
            <button type="submit" class="btn-reset" id="resetBtn">Send Reset Link</button>
        </form>
        
        <div class="back-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://amxhpxqakqrjjihwkzcq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteGhweHFha3FyamppaHdremNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5Nzc2NjUsImV4cCI6MjA4MzU1MzY2NX0.yIAZtz3bUc_ZxF8-f4cqW1fKJgFiRsiJdj4qgCDmM0g";
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const resetBtn = document.getElementById('resetBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        if (!email) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Please enter your email address';
            return;
        }
        
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<span class="spinner"></span> Sending...';
        
        try {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/update-password.html'
            });
            
            if (error) throw error;
            
            successMsg.style.display = 'block';
            successMsg.innerHTML = 'Password reset link sent! Check your email.';
            resetBtn.disabled = false;
            resetBtn.innerHTML = 'Send Reset Link';
            document.getElementById('email').value = '';
            
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message || 'Failed to send reset link. Please try again.';
            resetBtn.disabled = false;
            resetBtn.innerHTML = 'Send Reset Link';
        }
    });
</script>
</body>
</html>
