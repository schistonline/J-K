<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Inquiries - J8K Ventures Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
}

.loading{
    text-align:center;
    padding:50px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.spinner{
    width:50px;
    height:50px;
    border:4px solid #ddd;
    border-top-color:#0a7cff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.dashboard-header{
    background:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    position:sticky;
    top:0;
    z-index:100;
    flex-wrap:wrap;
    gap:15px;
}

.dashboard-header h1{
    font-size:20px;
    color:#0a7cff;
}

.user-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.user-email{
    font-size:14px;
    color:#666;
}

.logout-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.dashboard-body{
    display:flex;
    min-height:calc(100vh - 65px);
}

.sidebar{
    width:260px;
    background:#1a1a2e;
    color:white;
    padding:20px 0;
}

.sidebar a{
    display:block;
    padding:14px 20px;
    color:white;
    text-decoration:none;
    transition:all 0.3s;
}

.sidebar a:hover, .sidebar a.active{
    background:#0a7cff;
}

.sidebar a i{
    margin-right:12px;
    width:20px;
}

.content{
    flex:1;
    padding:25px;
    overflow-x:auto;
}

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.page-header h2{
    font-size:24px;
}

.filters{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.filter-select{
    padding:10px 15px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.btn-whatsapp{
    background:#25D366;
    color:white;
    padding:5px 12px;
    font-size:12px;
    text-decoration:none;
    border-radius:5px;
}

.btn-whatsapp:hover{
    background:#1da851;
}

table{
    width:100%;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

th, td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background:#f8f9fa;
}

.status-badge{
    display:inline-block;
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
}

.status-pending{
    background:#fff3cd;
    color:#856404;
}

.status-read{
    background:#d4edda;
    color:#155724;
}

.status-replied{
    background:#cce5ff;
    color:#004085;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.modal-content{
    background:white;
    max-width:600px;
    width:90%;
    border-radius:15px;
    max-height:85vh;
    overflow-y:auto;
}

.modal-header{
    padding:18px;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.modal-body{
    padding:20px;
}

.detail-row{
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.detail-label{
    font-weight:bold;
    font-size:12px;
    color:#666;
    margin-bottom:5px;
}

.detail-value{
    font-size:14px;
    color:#333;
}

.reply-box{
    margin-top:20px;
    padding-top:15px;
    border-top:2px solid #0a7cff;
}

.reply-box textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:10px;
    font-family:Arial;
}

.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    z-index:1000;
    display:none;
}

@media (max-width:768px){
    .dashboard-body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
        display:flex;
        overflow-x:auto;
        padding:10px;
    }
    .sidebar a{
        display:inline-block;
        padding:10px 15px;
        white-space:nowrap;
    }
    table{
        font-size:12px;
    }
    th, td{
        padding:8px;
    }
    .filters{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading inquiries...</p>
</div>

<div id="dashboardContent" style="display:none;">
    <div class="dashboard-header">
        <h1 id="companyNameHeader">J8K Ventures</h1>
        <div class="user-info">
            <span class="user-email" id="userEmail"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="dashboard-body">
        <div class="sidebar">
            <a href="index.html"><i>📊</i> Overview</a>
            <a href="products.html"><i>🐔</i> Products</a>
            <a href="testimonials.html"><i>⭐</i> Testimonials</a>
            <a href="promotions.html"><i>💉</i> Promotions</a>
            <a href="inquiries.html" class="active"><i>📨</i> Inquiries</a>
            <a href="profile.html"><i>🏢</i> Profile</a>
        </div>
        
        <div class="content">
            <div class="page-header">
                <h2>Customer Inquiries</h2>
            </div>
            
            <div class="filters">
                <select id="statusFilter" class="filter-select" onchange="filterInquiries()">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="read">Read</option>
                    <option value="replied">Replied</option>
                </select>
                <input type="text" id="searchInput" class="filter-select" placeholder="Search by name or phone..." onkeyup="filterInquiries()" style="width:250px;">
            </div>
            
            <div style="overflow-x:auto;">
                <table id="inquiriesTable">
                    <thead>
                        <tr><th>Date</th><th>Customer</th><th>Phone</th><th>Product</th><th>Message</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody><tr><td colspan="7">Loading...</td></tr>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Inquiry Detail Modal -->
<div id="inquiryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Inquiry Details</h3>
            <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body" id="inquiryDetailBody">
            <!-- Dynamic content -->
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://amxhpxqakqrjjihwkzcq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteGhweHFha3FyamppaHdremNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5Nzc2NjUsImV4cCI6MjA4MzU1MzY2NX0.yIAZtz3bUc_ZxF8-f4cqW1fKJgFiRsiJdj4qgCDmM0g";
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    let supplierData = null;
    let allInquiries = [];
    let filteredInquiries = [];
    
    async function checkAuth() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = '../login.html';
            return;
        }
        currentUser = session.user;
        document.getElementById('userEmail').textContent = currentUser.email;
        await loadSupplier();
        await loadInquiries();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
    }
    
    async function loadSupplier() {
        let { data } = await sb
            .from('poultry_suppliers')
            .select('*')
            .eq('user_id', currentUser.id)
            .maybeSingle();
        
        if (!data) {
            const { data: byEmail } = await sb
                .from('poultry_suppliers')
                .select('*')
                .eq('email', currentUser.email)
                .maybeSingle();
            data = byEmail;
        }
        
        supplierData = data;
        if (supplierData) {
            document.getElementById('companyNameHeader').textContent = supplierData.company_name || 'My Business';
        }
    }
    
    async function loadInquiries() {
        if (!supplierData) return;
        
        const { data } = await sb
            .from('poultry_inquiries')
            .select('*')
            .eq('supplier_id', supplierData.id)
            .order('created_at', { ascending: false });
        
        allInquiries = data || [];
        filteredInquiries = [...allInquiries];
        renderInquiriesTable();
    }
    
    function renderInquiriesTable() {
        const tbody = document.querySelector('#inquiriesTable tbody');
        if (filteredInquiries.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No inquiries found.</td></tr>';
            return;
        }
        
        tbody.innerHTML = filteredInquiries.map(i => `
            <tr>
                <td>${new Date(i.created_at).toLocaleDateString()} ${new Date(i.created_at).toLocaleTimeString()}</td>
                <td><strong>${escapeHtml(i.inquirer_name)}</strong></td>
                <td>${i.inquirer_phone}</td>
                <td>${escapeHtml(i.product_interest || '-')}</td>
                <td style="max-width:250px;">${escapeHtml((i.message || '').substring(0, 60))}${i.message && i.message.length > 60 ? '...' : ''}</td>
                <td><span class="status-badge status-${i.status || 'pending'}">${i.status || 'pending'}</span></td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="viewInquiry('${i.id}')" style="padding:5px 10px; margin-right:5px;">View</button>
                    <a href="https://wa.me/${i.inquirer_phone.replace(/\D/g, '')}" class="btn-whatsapp" target="_blank" style="padding:5px 10px;">Reply</a>
                 </td>
            </tr>
        `).join('');
    }
    
    function filterInquiries() {
        const status = document.getElementById('statusFilter').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        filteredInquiries = allInquiries.filter(i => {
            if (status !== 'all' && i.status !== status) return false;
            if (search && !i.inquirer_name.toLowerCase().includes(search) && !i.inquirer_phone.includes(search)) return false;
            return true;
        });
        
        renderInquiriesTable();
    }
    
    async function viewInquiry(id) {
        const inquiry = allInquiries.find(i => i.id === id);
        if (!inquiry) return;
        
        // Mark as read if pending
        if (inquiry.status === 'pending') {
            await sb.from('poultry_inquiries').update({ status: 'read' }).eq('id', id);
            inquiry.status = 'read';
            await loadInquiries();
        }
        
        const modalBody = document.getElementById('inquiryDetailBody');
        modalBody.innerHTML = `
            <div class="detail-row">
                <div class="detail-label">Date Received</div>
                <div class="detail-value">${new Date(inquiry.created_at).toLocaleString()}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Customer Name</div>
                <div class="detail-value">${escapeHtml(inquiry.inquirer_name)}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Phone Number</div>
                <div class="detail-value">${inquiry.inquirer_phone}</div>
            </div>
            ${inquiry.inquirer_email ? `<div class="detail-row">
                <div class="detail-label">Email</div>
                <div class="detail-value">${escapeHtml(inquiry.inquirer_email)}</div>
            </div>` : ''}
            <div class="detail-row">
                <div class="detail-label">Product Interested In</div>
                <div class="detail-value">${escapeHtml(inquiry.product_interest || 'Not specified')}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Quantity</div>
                <div class="detail-value">${inquiry.quantity_interest ? inquiry.quantity_interest + ' birds' : 'Not specified'}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Message</div>
                <div class="detail-value">${escapeHtml(inquiry.message || 'No message')}</div>
            </div>
            <div class="reply-box">
                <div class="detail-label">Quick Reply via WhatsApp</div>
                <textarea id="replyMessage" rows="3" placeholder="Type your reply here...">Thank you for your inquiry! We will get back to you shortly.</textarea>
                <button onclick="sendReply('${inquiry.inquirer_phone}', '${inquiry.id}')" class="btn btn-primary" style="margin-top:10px; width:100%;">📱 Send via WhatsApp</button>
            </div>
        `;
        
        document.getElementById('inquiryModal').style.display = 'flex';
    }
    
    function sendReply(phone, inquiryId) {
        const message = document.getElementById('replyMessage').value;
        if (!message) return;
        
        // Mark as replied
        sb.from('poultry_inquiries').update({ status: 'replied' }).eq('id', inquiryId);
        
        // Open WhatsApp
        const cleanPhone = phone.replace(/\D/g, '');
        const encodedMsg = encodeURIComponent(message);
        window.open(`https://wa.me/${cleanPhone}?text=${encodedMsg}`, '_blank');
        
        showToast('Opening WhatsApp...');
        closeModal();
        setTimeout(() => loadInquiries(), 1000);
    }
    
    function closeModal() {
        document.getElementById('inquiryModal').style.display = 'none';
    }
    
    async function logout() {
        await sb.auth.signOut();
        window.location.href = '../login.html';
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.filterInquiries = filterInquiries;
    window.viewInquiry = viewInquiry;
    window.closeModal = closeModal;
    window.sendReply = sendReply;
    window.logout = logout;
    
    checkAuth();
</script>
</body>
</html>
