<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>J8K Ventures - Poultry Business Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container{
    max-width:500px;
    width:100%;
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.logo span{
    font-size:60px;
}

h1{
    color:white;
    font-size:36px;
    margin-bottom:15px;
    text-shadow:2px 2px 4px rgba(0,0,0,0.2);
}

.tagline{
    color:rgba(255,255,255,0.9);
    font-size:16px;
    margin-bottom:40px;
}

.btn-dashboard{
    display:inline-block;
    background:white;
    color:#0a7cff;
    padding:15px 40px;
    border-radius:50px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:all 0.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.btn-dashboard:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.btn-store{
    display:inline-block;
    background:transparent;
    color:white;
    padding:12px 30px;
    border-radius:50px;
    text-decoration:none;
    font-size:16px;
    margin-top:20px;
    border:2px solid white;
    transition:all 0.3s;
}

.btn-store:hover{
    background:white;
    color:#0a7cff;
}

.features{
    margin-top:60px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.feature{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:15px 20px;
    border-radius:12px;
    color:white;
    font-size:14px;
}

.footer{
    margin-top:60px;
    color:rgba(255,255,255,0.6);
    font-size:12px;
}

@media (max-width: 600px){
    h1{
        font-size:28px;
    }
    .logo{
        width:90px;
        height:90px;
    }
    .logo span{
        font-size:45px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">
        <span>🐔</span>
    </div>
    
    <h1>J8K Ventures</h1>
    <p class="tagline">Poultry Business Management System</p>
    
    <a href="dashboard/index.html" class="btn-dashboard">
        📊 Go to Dashboard
    </a>
    
    <br>
    
    <a href="store/index.html" class="btn-store">
        🏪 View Public Store
    </a>
    
    <div class="features">
        <div class="feature">📦 Manage Products</div>
        <div class="feature">⭐ Customer Testimonials</div>
        <div class="feature">💉 Promotions & Vaccination</div>
        <div class="feature">📨 Customer Inquiries</div>
        <div class="feature">🏢 Company Profile</div>
    </div>
    
    <div class="footer">
        © 2026 J8K Ventures | Powered by Supabase
    </div>
</div>

</body>
</html>
