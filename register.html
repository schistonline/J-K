<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Register - J8K Ventures Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.register-container{
    max-width:450px;
    width:100%;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    overflow:hidden;
}

.register-header{
    background:#0a7cff;
    padding:40px 30px;
    text-align:center;
    color:white;
}

.register-header h1{
    font-size:28px;
    margin-bottom:10px;
}

.register-header p{
    opacity:0.9;
    font-size:14px;
}

.register-body{
    padding:40px 30px;
}

.form-group{
    margin-bottom:25px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
    font-size:14px;
}

.form-group label .required{
    color:#dc3545;
}

.form-group input{
    width:100%;
    padding:14px;
    border:2px solid #e0e0e0;
    border-radius:12px;
    font-size:14px;
    transition:all 0.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#0a7cff;
}

.btn-register{
    width:100%;
    padding:14px;
    background:#0a7cff;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:background 0.3s;
    margin-top:10px;
}

.btn-register:hover{
    background:#005fcc;
}

.login-link{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:14px;
}

.login-link a{
    color:#0a7cff;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

.error-msg{
    background:#fee;
    color:#dc3545;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.success-msg{
    background:#d4edda;
    color:#28a745;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.terms{
    margin:20px 0;
    font-size:12px;
    color:#666;
    text-align:center;
}

.terms a{
    color:#0a7cff;
    text-decoration:none;
}

.spinner{
    display:inline-block;
    width:16px;
    height:16px;
    border:2px solid white;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin-right:8px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.btn-register:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

.password-strength{
    margin-top:8px;
    font-size:12px;
}

.strength-weak{ color:#dc3545; }
.strength-medium{ color:#ffc107; }
.strength-strong{ color:#28a745; }
</style>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <h1>Create Account</h1>
        <p>Join J8K Ventures Dashboard</p>
    </div>
    
    <div class="register-body">
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label>Password <span class="required">*</span></label>
                <input type="password" id="password" required placeholder="Create a password (min 6 characters)">
                <div id="passwordStrength" class="password-strength"></div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirmPassword" required placeholder="Confirm your password">
            </div>
            
            <div class="terms">
                By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </div>
            
            <button type="submit" class="btn-register" id="registerBtn">Create Account</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://amxhpxqakqrjjihwkzcq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteGhweHFha3FyamppaHdremNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5Nzc2NjUsImV4cCI6MjA4MzU1MzY2NX0.yIAZtz3bUc_ZxF8-f4cqW1fKJgFiRsiJdj4qgCDmM0g";
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Password strength checker
    document.getElementById('password').addEventListener('input', function() {
        const password = this.value;
        const strengthDiv = document.getElementById('passwordStrength');
        
        if (password.length === 0) {
            strengthDiv.innerHTML = '';
            return;
        }
        
        let strength = 'weak';
        let message = '';
        
        if (password.length >= 8 && /[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
            strength = 'strong';
            message = '✓ Strong password';
        } else if (password.length >= 6 && /[a-zA-Z]/.test(password) && /[0-9]/.test(password)) {
            strength = 'medium';
            message = '⚠️ Medium password - add uppercase letters for better security';
        } else {
            message = '❌ Weak password - use at least 6 characters with letters and numbers';
        }
        
        strengthDiv.innerHTML = `<span class="strength-${strength}">${message}</span>`;
    });
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        const registerBtn = document.getElementById('registerBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        // Hide previous messages
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        // Validation
        if (!email || !password) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Please fill in all fields';
            return;
        }
        
        if (password !== confirmPassword) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Passwords do not match';
            return;
        }
        
        if (password.length < 6) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Password must be at least 6 characters';
            return;
        }
        
        // Show loading state
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';
        
        try {
            // Create auth user
            const { data: authData, error: authError } = await sb.auth.signUp({
                email: email,
                password: password
            });
            
            if (authError) throw authError;
            
            if (authData.user) {
                // Create a basic supplier profile automatically
                const baseSlug = email.split('@')[0].toLowerCase().replace(/[^a-z0-9]+/g, '-').substring(0, 40);
                
                await sb
                    .from('poultry_suppliers')
                    .insert([{
                        user_id: authData.user.id,
                        company_name: 'My Poultry Business',
                        slug: baseSlug + '-' + authData.user.id.slice(0, 6),
                        email: email,
                        phone: '',
                        whatsapp_number: '',
                        description: 'Edit your business description in the dashboard',
                        address: '',
                        is_active: true,
                        created_at: new Date().toISOString()
                    }]);
                
                // Show success message
                successMsg.style.display = 'block';
                successMsg.innerHTML = 'Account created successfully! <br>Redirecting to login...';
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
            
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message || 'Registration failed. Please try again.';
            registerBtn.disabled = false;
            registerBtn.innerHTML = 'Create Account';
        }
    });
    
    // Check if already logged in
    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            window.location.href = 'dashboard.html';
        }
    }
    
    checkSession();
</script>
</body>
</html>
