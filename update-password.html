<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Update Password - J8K Ventures</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.update-container{
    max-width:450px;
    width:100%;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    overflow:hidden;
}

.update-header{
    background:#0a7cff;
    padding:40px 30px;
    text-align:center;
    color:white;
}

.update-header h1{
    font-size:28px;
    margin-bottom:10px;
}

.update-body{
    padding:40px 30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
    font-size:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border:2px solid #e0e0e0;
    border-radius:12px;
    font-size:14px;
}

.form-group input:focus{
    outline:none;
    border-color:#0a7cff;
}

.btn-update{
    width:100%;
    padding:14px;
    background:#0a7cff;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:background 0.3s;
    margin-top:10px;
}

.btn-update:hover{
    background:#005fcc;
}

.error-msg{
    background:#fee;
    color:#dc3545;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.success-msg{
    background:#d4edda;
    color:#28a745;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
    display:none;
}

.spinner{
    display:inline-block;
    width:16px;
    height:16px;
    border:2px solid white;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin-right:8px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.password-strength{
    margin-top:8px;
    font-size:12px;
}
</style>
</head>
<body>

<div class="update-container">
    <div class="update-header">
        <h1>Set New Password</h1>
        <p>Create a new password for your account</p>
    </div>
    
    <div class="update-body">
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form id="updateForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="Enter new password">
                <div id="passwordStrength" class="password-strength"></div>
            </div>
            
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm new password">
            </div>
            
            <button type="submit" class="btn-update" id="updateBtn">Update Password</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://amxhpxqakqrjjihwkzcq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteGhweHFha3FyamppaHdremNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5Nzc2NjUsImV4cCI6MjA4MzU1MzY2NX0.yIAZtz3bUc_ZxF8-f4cqW1fKJgFiRsiJdj4qgCDmM0g";
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Password strength checker
    document.getElementById('password').addEventListener('input', function() {
        const password = this.value;
        const strengthDiv = document.getElementById('passwordStrength');
        
        if (password.length === 0) {
            strengthDiv.innerHTML = '';
            return;
        }
        
        let strength = 'weak';
        let message = '';
        
        if (password.length >= 8 && /[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
            strength = 'strong';
            message = '✓ Strong password';
        } else if (password.length >= 6 && /[a-zA-Z]/.test(password) && /[0-9]/.test(password)) {
            strength = 'medium';
            message = '⚠️ Medium strength';
        } else {
            message = '❌ Weak password - use at least 8 characters with letters and numbers';
        }
        
        strengthDiv.innerHTML = `<span style="color: ${strength === 'strong' ? '#28a745' : (strength === 'medium' ? '#ffc107' : '#dc3545')}">${message}</span>`;
    });
    
    document.getElementById('updateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const updateBtn = document.getElementById('updateBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        if (password !== confirmPassword) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Passwords do not match';
            return;
        }
        
        if (password.length < 6) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Password must be at least 6 characters';
            return;
        }
        
        updateBtn.disabled = true;
        updateBtn.innerHTML = '<span class="spinner"></span> Updating...';
        
        try {
            const { error } = await sb.auth.updateUser({ password: password });
            
            if (error) throw error;
            
            successMsg.style.display = 'block';
            successMsg.innerHTML = 'Password updated successfully! Redirecting to login...';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
            
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message || 'Failed to update password. Please try again.';
            updateBtn.disabled = false;
            updateBtn.innerHTML = 'Update Password';
        }
    });
</script>
</body>
</html>
